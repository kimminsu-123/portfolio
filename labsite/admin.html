<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabSite 관리자</title>
<link rel="stylesheet" href="./css/style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="loading-view" class="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <header class="site-header">
    <div class="site-title">LabSite 관리자</div>

    <div id="login-area">
      <div id="google-signin-button"></div>
    </div>

    <div id="user-area">
      <span id="user-role" class="badge"></span>
      <span id="user-email"></span>
      <button id="logout-btn" class="header-btn">로그아웃</button>
    </div>
  </header>

  <main>
    <div id="logged-out-view">
      <h1>관리자 로그인이 필요합니다</h1>
      <p>구글 계정으로 로그인해주세요.</p>
    </div>

    <div id="not-admin-view" style="display:none;">
      <h1>관리자 계정이 아닙니다</h1>
      <p>이 페이지는 관리자 계정으로 로그인해야 사용할 수 있습니다.</p>
    </div>

    <section id="admin-panel" class="upload-section" style="display:none;">
      <h2>강의자료 업로드</h2>
      <form id="upload-form" class="admin-form">
        <input id="upload-title" type="text" placeholder="제목" required>
        <input id="upload-week" type="text" placeholder="주차">
        <input id="upload-file" type="file" accept=".pptx,.ppt,.html,.htm" required>
        <button id="upload-submit-btn" type="submit">업로드</button>
        <span id="upload-status" class="admin-form-status"></span>
      </form>
    </section>

    <section id="students-panel" class="upload-section" style="display:none;">
      <h2>수강생 관리</h2>
      <form id="student-form" class="admin-form">
        <input id="student-email" type="email" placeholder="이메일" required>
        <input id="student-name" type="text" placeholder="이름" required>
        <button id="student-submit-btn" type="submit">등록</button>
        <span id="student-status" class="admin-form-status"></span>
      </form>
      <div id="students-list" class="lectures-list">
        <p class="lectures-empty">불러오는 중...</p>
      </div>
    </section>

    <section id="assignments-panel" class="upload-section" style="display:none;">
      <h2>과제 관리</h2>
      <form id="assignment-form" class="admin-form">
        <input id="assignment-title" type="text" placeholder="제목" required>
        <input id="assignment-due-date" type="date">
        <textarea id="assignment-description" placeholder="설명"></textarea>
        <button id="assignment-submit-btn" type="submit">생성</button>
        <span id="assignment-status" class="admin-form-status"></span>
      </form>
      <div id="assignments-list" class="lectures-list">
        <p class="lectures-empty">불러오는 중...</p>
      </div>
    </section>
  </main>

  <section class="lectures-section">
    <h2>강의자료 관리</h2>
    <div id="lectures-list" class="lectures-list">
      <p class="lectures-empty">불러오는 중...</p>
    </div>
  </section>

  <div id="preview-overlay" class="preview-overlay" style="display:none;">
    <div class="preview-modal">
      <div class="preview-header">
        <span id="preview-title"></span>
        <button id="preview-close-btn" class="preview-close">✕</button>
      </div>
      <div class="preview-body" id="preview-body"></div>
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/lectures.js"></script>
  <script src="./js/upload.js"></script>
  <script src="./js/students.js"></script>
  <script src="./js/assignments.js"></script>
  <script src="./js/admin.js"></script>
</body>
</html>
